<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>证件照编辑器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f6; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: #1e2a3a; margin-bottom: 24px; font-size: 26px; }
        .editor-box { display: flex; gap: 24px; background: #fff; border-radius: 24px; padding: 24px; min-height: 640px; box-shadow: 0 8px 20px rgba(0,0,0,.05); }
        .left-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .right-panel { width: 480px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; }
        .canvas-wrapper { background: #f8fafc; border-radius: 20px; overflow: hidden; border: 1px solid #e9edf2; position: relative; flex: 1; min-height: 480px; box-shadow: inset 0 1px 3px rgba(0,0,0,.05); }
        #relativeContainer { position: relative; display: inline-block; width: 100%; height: 100%; min-height: 480px; overflow: hidden; }
        .image-viewport { position: absolute; transform-origin: center center; transition: transform 0.05s ease-out; cursor: grab; left: 50%; top: 50%; will-change: transform; }
        .image-viewport:active { cursor: grabbing; }
        #canvas { display: block; background: #f1f5f9; box-shadow: 0 2px 8px rgba(0,0,0,.1); border-radius: 8px; }

        .custom-crop-overlay { position: absolute; border: 2px dashed #f97316; background: rgba(0,0,0,.2); cursor: move; z-index: 20; box-sizing: border-box; pointer-events: auto; backdrop-filter: brightness(0.95); }
        .custom-crop-overlay::after { content: attr(data-size); position: absolute; bottom: -26px; left: 4px; background: #f97316; color: white; font-size: 11px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; font-weight: 500; pointer-events: none; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
        .custom-crop-overlay .resize-handle { position: absolute; width: 14px; height: 14px; background: #f97316; border-radius: 3px; bottom: -7px; right: -7px; cursor: nw-resize; border: 2px solid white; box-shadow: 0 1px 2px rgba(0,0,0,.3); }
        .toolbar { display: flex; flex-direction: column; gap: 20px; }
        .tool-group { display: flex; flex-direction: column; gap: 10px; background: #f9fafb; padding: 12px 16px; border-radius: 20px; }
        .tool-group label { font-size: 13px; font-weight: 600; color: #1e293b; letter-spacing: 0.3px; }
        select, input[type="number"], input[type="range"] { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 14px; font-size: 14px; background: white; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border: none; border-radius: 40px; font-size: 13px; font-weight: 500; cursor: pointer; background: #f1f5f9; transition: 0.2s; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; transform: scale(0.98); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-default { background: #f8fafc; border: 1px solid #e2e8f0; }
        .btn-default:hover { background: #eef2ff; }
        .info-bar { margin-top: 12px; padding: 12px; background: #f1f5f9; border-radius: 16px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .zoom-info { color: #475569; font-weight: 500; display: flex; align-items: center; gap: 12px; }
        .circle-size-row { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .custom-crop-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
        .custom-crop-row input { width: 100px; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; background: #f1f5f9; padding: 6px 12px; border-radius: 32px; }
        .upload-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; min-height: 420px; cursor: pointer; background: #f9fafb; border-radius: 20px; border: 2px dashed #cbd5e1; transition: all 0.2s; }
        .upload-placeholder:hover { background: #eef2ff; border-color: #3b82f6; }
        .fit-btn { background: #6366f1; color: white; border: none; padding: 4px 12px; border-radius: 30px; font-size: 12px; margin-left: 8px; cursor: pointer; }
        .badge { background: #e2e8f0; padding: 2px 8px; border-radius: 20px; font-size: 11px; }
        .loading-tip { position: fixed; bottom: 30px; right: 30px; background: #1e293b; color: white; padding: 8px 16px; border-radius: 40px; font-size: 13px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,.2); pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        .zoom-slider-row { display: flex; align-items: center; gap: 12px; margin-top: 5px; }
        .zoom-slider-row span { font-size: 13px; min-width: 45px; }
        input[type="range"].zoom-range { flex: 1; }
        .size-mode-group { display: flex; gap: 16px; margin-bottom: 8px; }
        .size-mode-group label { display: flex; align-items: center; gap: 6px; font-weight: normal; cursor: pointer; }
        .size-control { margin-top: 5px; }
        .bgs { display: flex; flex-wrap: wrap; gap: 6px; }
        .bg { width: 32px; height: 32px; border-radius: 5px; border: 2px solid transparent; cursor: pointer; }
        .bg:hover, .bg.a { border-color: #3b82f6; transform: scale(1.1); }
        .progress { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,.8); color: #fff; padding: 20px 30px; border-radius: 10px; text-align:center; display:none; z-index: 100; }
        .progress .bar { width: 200px; height: 6px; background: #333; border-radius: 3px; margin-top: 10px; }
        .progress .bar-fill { height: 100%; background: #3b82f6; border-radius: 3px; transition: width .3s; }
    </style>
    <script type="module">
        import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.6/+esm';
        window.removeBackground = removeBackground;
    </script>
</head>
<body>
<div class="container">
    <h1>📷 证件照编辑器</h1>
    <div class="editor-box">
        <div class="left-panel">
            <div class="canvas-wrapper" id="imgContainer">
                <div id="uploadPlaceholder" class="upload-placeholder">
                    <div style="text-align:center; color:#64748b;">
                        <div style="font-size:52px;">📸</div>
                        <div>点击或拖拽上传照片</div>
                        <div style="font-size:12px; margin-top:8px;">AI自动抠图 · 可选背景色 · 精准裁剪</div>
                    </div>
                </div>
                <div id="relativeContainer" style="width:100%; height:100%; display:none;">
                    <div class="image-viewport" id="imageViewport">
                        <canvas id="canvas"></canvas>
                    </div>
                    <div id="customCropBox" class="custom-crop-overlay" style="display: none;">
                        <div class="resize-handle"></div>
                    </div>
                </div>
                <div class="progress" id="prog">
                    <div id="progText">AI抠图中...</div>
                    <div class="bar"><div class="bar-fill" id="progBar" style="width:0%"></div></div>
                </div>
                <input type="file" id="uploadInput" accept="image/*" style="display:none;">
            </div>
            <div class="info-bar">
                <span id="imageInfo">✨ 等待上传图片</span>
                <div class="zoom-info">
                    🔍 <span id="zoomLevel">100%</span>
                    <button id="fitViewBtn" class="fit-btn">适应窗口</button>
                </div>
            </div>
        </div>
        <div class="right-panel">
            <div class="toolbar">
                <div class="tool-group">
                    <label>🔍 视图缩放 (5% ~ 300%)</label>
                    <div class="zoom-slider-row">
                        <span>🔍</span>
                        <input type="range" id="zoomSlider" class="zoom-range" min="5" max="300" step="1" value="100">
                        <span id="zoomPercent">100%</span>
                    </div>
                </div>
                <div class="tool-group">
                    <label>🎨 背景颜色 (需开启AI抠图)</label>
                    <div class="checkbox-label" style="margin-bottom:8px; padding:10px 16px; font-size:14px;">
                        <input type="checkbox" id="enableMatteCheckbox" style="width:18px; height:18px;">
                        <span style="font-size:14px; font-weight:600;">🤖 启用AI抠图换背景</span>
                    </div>
                    <div class="bgs" id="bgs"></div>
                </div>
                <div class="tool-group">
                    <label>📐 证件照尺寸</label>
                    <select id="ratioSelect">
                        <option value="free" data-w="480" data-h="650">自由尺寸 (自定义)</option>
                        <option value="1寸" data-w="295" data-h="413">1寸 (295×413)</option>
                        <option value="小1寸" data-w="260" data-h="378">小1寸 (260×378)</option>
                        <option value="大1寸" data-w="390" data-h="567">大1寸 (390×567)</option>
                        <option value="2寸" data-w="413" data-h="579">2寸 (413×579)</option>
                        <option value="小2寸" data-w="378" data-h="534">小2寸 (378×534)</option>
                        <option value="大2寸" data-w="413" data-h="626">大2寸 (413×626)</option>
                        <option value="身份证" data-w="358" data-h="441">身份证 (358×441)</option>
                        <option value="护照" data-w="354" data-h="472">护照 (354×472)</option>
                        <option value="驾照" data-w="295" data-h="413">驾照 (295×413)</option>
                        <option value="港澳通行证" data-w="390" data-h="567">港澳通行证 (390×567)</option>
                        <option value="台湾通行证" data-w="354" data-h="472">台湾通行证 (354×472)</option>
                        <option value="美国签证" data-w="600" data-h="600">美国签证 (600×600)</option>
                        <option value="日本签证" data-w="413" data-h="531">日本签证 (413×531)</option>
                        <option value="韩国签证" data-w="354" data-h="472">韩国签证 (354×472)</option>
                        <option value="欧洲签证" data-w="354" data-h="472">欧洲签证 (354×472)</option>
                        <option value="四六级考试" data-w="144" data-h="192">四六级考试 (144×192)</option>
                        <option value="教师资格证" data-w="354" data-h="472">教师资格证 (354×472)</option>
                        <option value="会计资格证" data-w="354" data-h="472">会计资格证 (354×472)</option>
                        <option value="司法考试" data-w="295" data-h="413">司法考试 (295×413)</option>
                        <option value="公务员考试" data-w="295" data-h="413">公务员考试 (295×413)</option>
                        <option value="考研" data-w="295" data-h="413">考研 (295×413)</option>
                        <option value="计算机等级" data-w="295" data-h="413">计算机等级 (295×413)</option>
                        <option value="简历" data-w="354" data-h="472">简历 (354×472)</option>
                        <option value="1:1方形" data-w="500" data-h="500">1:1方形 (500×500)</option>
                        <option value="3:4竖版" data-w="300" data-h="400">3:4竖版 (300×400)</option>
                        <option value="4:3横版" data-w="400" data-h="300">4:3横版 (400×300)</option>
                    </select>
                    <div id="customSizeRow" class="custom-crop-row" style="margin-top:8px;">
                        <label style="font-size:12px;">自定义:</label>
                        <input type="number" id="customWidthInput" placeholder="宽(px)" value="480" step="10" min="20" style="width:80px;">
                        <span>×</span>
                        <input type="number" id="customHeightInput" placeholder="高(px)" value="650" step="10" min="20" style="width:80px;">
                    </div>
                    <div class="badge" style="margin-top:8px;">💡 拖拽裁剪框移动位置，右下角可缩放大小</div>
                    <div style="margin-top:8px;">
                        <label style="font-size:12px; font-weight:600;">圆角: <span id="cornerRadiusValue">0</span>°</label>
                        <input type="range" id="cornerRadiusSlider" min="0" max="45" value="0" step="1" style="width:100%;">
                    </div>
                    <div class="btn-group" style="margin-top:8px;">
                        <button class="btn btn-success" id="applyCustomCropBtn">✂️ 确认裁剪</button>
                        <select id="downloadFormat" style="flex:1; padding:8px 12px; border:1px solid #cbd5e1; border-radius:14px; font-size:14px; background:white;">
                            <option value="jpg">JPG格式</option>
                            <option value="png">PNG格式</option>
                            <option value="webp">WebP格式</option>
                            <option value="bmp">BMP格式</option>
                            <option value="gif">GIF格式</option>
                        </select>
                        <button class="btn btn-primary" id="downloadCropBtn">📥 下载</button>
                    </div>
                </div>
                <div class="tool-group">
                    <label>📏 输出文件大小</label>
                    <div class="size-mode-group">
                        <label><input type="radio" name="sizeMode" value="quality" checked> 手动质量</label>
                        <label><input type="radio" name="sizeMode" value="target"> 目标KB</label>
                    </div>
                    <div id="qualityControl" class="size-control">
                        <div class="zoom-slider-row">
                            <span>质量</span>
                            <input type="range" id="qualitySlider" min="1" max="100" value="95" step="1">
                            <span id="qualityValue">95%</span>
                        </div>
                    </div>
                    <div id="targetControl" class="size-control" style="display:none;">
                        <div class="custom-crop-row">
                            <span>目标:</span>
                            <input type="number" id="targetSizeKB" min="50" max="1024" value="300" step="10">
                            <span>KB</span>
                        </div>
                    </div>
                </div>
                <div class="tool-group">
                    <label>🔄 旋转 <span id="rotateValue">0°</span></label>
                    <input type="range" id="rotateSlider" min="-180" max="180" value="0" step="1">
                </div>
                <div class="tool-group">
                    <button class="btn btn-warning" id="undoBtn" disabled>↩️ 撤销</button>
                    <button class="btn btn-success" id="resetBtn">🔄 重置图片</button>
                    <button class="btn btn-default" id="reuploadBtn">📷 重新上传</button>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="loadingToast" class="loading-tip">⏳ 处理中...</div>
<script>
(function(){
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const imageViewport=document.getElementById('imageViewport'),relativeContainer=document.getElementById('relativeContainer');
const uploadPlaceholder=document.getElementById('uploadPlaceholder'),uploadInput=document.getElementById('uploadInput');
const ratioSelect=document.getElementById('ratioSelect'),rotateSlider=document.getElementById('rotateSlider');
const rotateValueSpan=document.getElementById('rotateValue');
const undoBtn=document.getElementById('undoBtn'),resetBtn=document.getElementById('resetBtn'),reuploadBtn=document.getElementById('reuploadBtn');
const fitViewBtn=document.getElementById('fitViewBtn'),loadingToast=document.getElementById('loadingToast');
const zoomSlider=document.getElementById('zoomSlider'),zoomPercent=document.getElementById('zoomPercent');
const qualitySlider=document.getElementById('qualitySlider'),qualityValue=document.getElementById('qualityValue');
const targetSizeKB=document.getElementById('targetSizeKB'),qualityControl=document.getElementById('qualityControl');
const targetControl=document.getElementById('targetControl'),sizeModeRadios=document.querySelectorAll('input[name="sizeMode"]');
const customWidthInput=document.getElementById('customWidthInput'),customHeightInput=document.getElementById('customHeightInput');
const applyCustomCropBtn=document.getElementById('applyCustomCropBtn');
const downloadFormat=document.getElementById('downloadFormat');
const downloadCropBtn=document.getElementById('downloadCropBtn');
const cornerRadiusSlider=document.getElementById('cornerRadiusSlider');
const cornerRadiusValue=document.getElementById('cornerRadiusValue');
const enableMatteCheckbox=document.getElementById('enableMatteCheckbox');
const customCropBox=document.getElementById('customCropBox'),prog=document.getElementById('prog');
const progBar=document.getElementById('progBar'),progText=document.getElementById('progText');

let currentImage=null,originalImage=null,rotateAngle=0,historyStack=[],zoomScale=1,viewportOffset={x:0,y:0},isProcessing=false;
let mattedImage=null,originalFile=null;
let customBoxActive=false,customBoxRect={left:100,top:100,width:480,height:650};
let isDraggingBox=false,isResizingBox=false,dragStartMouse={x:0,y:0},dragStartRect={left:0,top:0,width:0,height:0};

// 背景颜色
const B=[{n:'蓝',g:['#2563eb','#3b82f6']},{n:'白',g:['#e5e7eb','#ffffff']},{n:'红',g:['#dc2626','#ef4444']},{n:'浅蓝',g:['#60a5fa','#93c5fd']},{n:'深蓝',g:['#1e3a8a','#3b82f6']},{n:'渐红',g:['#991b1b','#ef4444']},{n:'灰',g:['#9ca3af','#d1d5db']},{n:'绿',g:['#16a34a','#22c55e']},{n:'粉',g:['#db2777','#f472b6']},{n:'紫',g:['#7c3aed','#a78bfa']}];
let currentBg=B[0];

// 初始化背景色
const bgs=document.getElementById('bgs');
B.forEach((b,i)=>{const d=document.createElement('div');d.className='bg'+(i===0?' a':'');d.style.background='linear-gradient('+b.g[0]+','+b.g[1]+')';d.title=b.n;d.onclick=()=>{bgs.querySelectorAll('.bg').forEach(z=>z.classList.remove('a'));d.classList.add('a');currentBg=b;renderImage()};bgs.appendChild(d)});

function updateSizeModeUI(){const mode=document.querySelector('input[name="sizeMode"]:checked').value;qualityControl.style.display=mode==='quality'?'block':'none';targetControl.style.display=mode==='target'?'block':'none'}
sizeModeRadios.forEach(r=>r.addEventListener('change',updateSizeModeUI));updateSizeModeUI();
function showLoading(show){loadingToast.style.opacity=show?'1':'0'}

function renderImage(){
    if(!currentImage)return;
    const ratio=ratioSelect.value;let targetW=null,targetH=null;
    if(ratio!=='free'){const opt=ratioSelect.options[ratioSelect.selectedIndex];if(opt&&opt.dataset.w&&opt.dataset.h){targetW=parseInt(opt.dataset.w);targetH=parseInt(opt.dataset.h)}}
    let drawW=currentImage.width,drawH=currentImage.height;
    if(targetW&&targetH){const imgRatio=drawW/drawH,tRatio=targetW/targetH;if(imgRatio>tRatio){drawW=targetW;drawH=drawW/imgRatio}else{drawH=targetH;drawW=drawH*imgRatio}}
    canvas.width=drawW;canvas.height=drawH;canvas.style.width=drawW+'px';canvas.style.height=drawH+'px';
    // 绘制背景色
    const g=ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0,currentBg.g[0]);g.addColorStop(1,currentBg.g[1]);
    ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
    // 绘制图片
    ctx.save();ctx.translate(canvas.width/2,canvas.height/2);ctx.rotate(rotateAngle*Math.PI/180);
    const img=mattedImage||currentImage;ctx.drawImage(img,-drawW/2,-drawH/2,drawW,drawH);ctx.restore();
}

function fitImageToContainer(){
    if(!currentImage||!canvas.width)return;
    const containerRect=relativeContainer.getBoundingClientRect();if(containerRect.width===0)return;
    const scaleX=containerRect.width/canvas.width,scaleY=containerRect.height/canvas.height;
    let fitScale=Math.min(scaleX,scaleY,1.2);fitScale=Math.max(0.05,fitScale);
    zoomScale=fitScale;viewportOffset={x:0,y:0};updateViewportTransform();updateZoomSlider();
    if(customBoxActive)updateCustomBoxUI();
}

function updateViewportTransform(){imageViewport.style.transform=`translate(-50%,-50%) translate(${viewportOffset.x}px,${viewportOffset.y}px) scale(${zoomScale})`}
function updateZoomSlider(){zoomSlider.value=Math.round(zoomScale*100);zoomPercent.innerText=Math.round(zoomScale*100)+'%';document.getElementById('zoomLevel').textContent=Math.round(zoomScale*100)+'%'}

function resetViewportAndBox(){
    if(!canvas.width)return;imageViewport.style.width=canvas.width+'px';imageViewport.style.height=canvas.height+'px';
    fitImageToContainer();const containerRect=relativeContainer.getBoundingClientRect();
    let w=parseInt(customWidthInput.value)||480,h=parseInt(customHeightInput.value)||650;
    w=Math.min(w,containerRect.width-10);h=Math.min(h,containerRect.height-10);
    customBoxRect.width=w;customBoxRect.height=h;customBoxRect.left=Math.max(0,(containerRect.width-w)/2);customBoxRect.top=Math.max(0,(containerRect.height-h)/2);
    if(customBoxActive)updateCustomBoxUI();
}

function updateCustomBoxUI(){
    if(!customBoxActive)return;const containerRect=relativeContainer.getBoundingClientRect();
    const maxX=containerRect.width-customBoxRect.width,maxY=containerRect.height-customBoxRect.height;
    customBoxRect.left=Math.max(0,Math.min(customBoxRect.left,maxX));customBoxRect.top=Math.max(0,Math.min(customBoxRect.top,maxY));
    customCropBox.style.left=customBoxRect.left+'px';customCropBox.style.top=customBoxRect.top+'px';
    customCropBox.style.width=customBoxRect.width+'px';customCropBox.style.height=customBoxRect.height+'px';
    customCropBox.setAttribute('data-size',`${Math.round(customBoxRect.width)}×${Math.round(customBoxRect.height)}`);
}

function showCustomBox(){if(!currentImage)return;customBoxActive=true;const containerRect=relativeContainer.getBoundingClientRect();
    if(!customBoxRect.width){let w=parseInt(customWidthInput.value)||480,h=parseInt(customHeightInput.value)||650;w=Math.min(w,containerRect.width);h=Math.min(h,containerRect.height);customBoxRect={left:(containerRect.width-w)/2,top:(containerRect.height-h)/2,width:w,height:h}}
    updateCustomBoxUI();customCropBox.style.display='block'}

function hideCustomBox(){customBoxActive=false;customCropBox.style.display='none'}

function getCanvasCropAreaFromBox(){
    if(!customBoxActive||!canvas.width)return null;
    const canvasRect=canvas.getBoundingClientRect(),boxRect=customCropBox.getBoundingClientRect();
    const overlapLeft=Math.max(canvasRect.left,boxRect.left),overlapTop=Math.max(canvasRect.top,boxRect.top);
    const overlapRight=Math.min(canvasRect.right,boxRect.right),overlapBottom=Math.min(canvasRect.bottom,boxRect.bottom);
    if(overlapLeft>=overlapRight||overlapTop>=overlapBottom)return null;
    const relLeft=(overlapLeft-canvasRect.left)/canvasRect.width,relTop=(overlapTop-canvasRect.top)/canvasRect.height;
    const relRight=(overlapRight-canvasRect.left)/canvasRect.width,relBottom=(overlapBottom-canvasRect.top)/canvasRect.height;
    let cropX=relLeft*canvas.width,cropY=relTop*canvas.height,cropW=(relRight-relLeft)*canvas.width,cropH=(relBottom-relTop)*canvas.height;
    cropX=Math.max(0,Math.min(cropX,canvas.width));cropY=Math.max(0,Math.min(cropY,canvas.height));
    cropW=Math.min(cropW,canvas.width-cropX);cropH=Math.min(cropH,canvas.height-cropY);
    if(cropW<=2||cropH<=2)return null;return{x:cropX,y:cropY,w:cropW,h:cropH};
}

function applyCustomCrop(){
    if(!currentImage)return alert('请先上传图片');if(!customBoxActive)return alert('请勾选显示固定裁剪框');if(isProcessing)return;
    const cropArea=getCanvasCropAreaFromBox();if(!cropArea||cropArea.w<=0)return alert('裁剪区域无效');
    isProcessing=true;showLoading(true);applyCustomCropBtn.disabled=true;saveHistory();
    const targetW=parseInt(customWidthInput.value)||480,targetH=parseInt(customHeightInput.value)||650;
    if(targetW<=0||targetH<=0){alert('宽高无效');finishProcessing();return}
    const offCanvas=document.createElement('canvas');offCanvas.width=targetW;offCanvas.height=targetH;
    const offCtx=offCanvas.getContext('2d');offCtx.drawImage(canvas,cropArea.x,cropArea.y,cropArea.w,cropArea.h,0,0,targetW,targetH);
    const img=new Image();img.onload=()=>{currentImage=img;rotateAngle=0;rotateSlider.value=0;rotateValueSpan.innerText='0°';
        ratioSelect.value='free';renderImage();resetViewportAndBox();updateImageInfo();
        showCustomBox();finishProcessing();saveHistory()};
    img.onerror=()=>{alert('裁剪失败');finishProcessing()};img.src=offCanvas.toDataURL();
}

function finishProcessing(){isProcessing=false;showLoading(false);applyCustomCropBtn.disabled=false}
function saveHistory(){if(!canvas.width||!canvas.height)return;historyStack.push(canvas.toDataURL());if(historyStack.length>20)historyStack.shift();undoBtn.disabled=false}

function undo(){
    if(historyStack.length===0||isProcessing)return;hideCustomBox();
    const url=historyStack.pop();const img=new Image();
    img.onload=()=>{canvas.width=img.width;canvas.height=img.height;ctx.drawImage(img,0,0);
        const newImg=new Image();newImg.onload=()=>{currentImage=newImg;updateImageInfo();resetViewportAndBox();
            if(showCustomBoxCheckbox.checked&&currentImage)showCustomBox();else hideCustomBox()};
        newImg.src=canvas.toDataURL();undoBtn.disabled=historyStack.length===0};img.src=url;
}

function resetImage(){if(!originalImage||isProcessing)return;saveHistory();currentImage=originalImage;rotateAngle=0;rotateSlider.value=0;
    rotateValueSpan.innerText='0°';renderImage();fitImageToContainer();showCustomBox();updateImageInfo()}

function updateImageInfo(){const infoSpan=document.getElementById('imageInfo');if(currentImage&&canvas.width)infoSpan.innerHTML=`📷 ${currentImage.width}×${currentImage.height} | 画布: ${canvas.width}×${canvas.height}`;else infoSpan.innerHTML='📷 未上传'}

// AI抠图
async function doMatte(blob){
    if(isProcessing||!window.removeBackground)return;
    isProcessing=true;prog.style.display='block';progText.textContent='AI抠图中...';progBar.style.width='0%';
    try{
        const result=await window.removeBackground(blob,{progress:p=>{progBar.style.width=Math.round(p*100)+'%'},output:{format:'image/png'}});
        const url=URL.createObjectURL(result);const img=new Image();
        img.onload=()=>{mattedImage=img;isProcessing=false;prog.style.display='none';renderImage();updateImageInfo()};
        img.src=url;
    }catch(e){console.error(e);isProcessing=false;prog.style.display='none';alert('抠图失败：'+e.message)}
}

// 加载图片
function loadImage(file){
    originalFile=file;const reader=new FileReader();
    reader.onload=e=>{const img=new Image();img.onload=()=>{
        currentImage=img;originalImage=img;mattedImage=null;rotateAngle=0;rotateSlider.value=0;rotateValueSpan.innerText='0°';
        ratioSelect.value='free';renderImage();uploadPlaceholder.style.display='none';relativeContainer.style.display='block';
        imageViewport.style.display='block';fitImageToContainer();updateImageInfo();
            showCustomBox();historyStack=[];undoBtn.disabled=true;
            // 如果抠图开关已打开，自动进行抠图
            if(enableMatteCheckbox.checked)doMatte(file)};
        img.src=e.target.result};reader.readAsDataURL(file);
}

function getDownloadDataURL(){
    const mode=document.querySelector('input[name="sizeMode"]:checked').value;
    if(mode==='quality'){return canvas.toDataURL('image/jpeg',parseInt(qualitySlider.value)/100)}
    else{const targetKB=parseInt(targetSizeKB.value);if(isNaN(targetKB)||targetKB<50||targetKB>1024){alert('目标大小需在50~1024KB');return null}
        let quality=0.95,url=canvas.toDataURL('image/jpeg',quality),sizeKB=url.length/1024;
        if(sizeKB<=targetKB){if(quality<1.0&&sizeKB<targetKB){let step=0.02;for(let q=Math.min(1.0,quality+step);q<=1.0;q+=step){const testUrl=canvas.toDataURL('image/jpeg',q);if(testUrl.length/1024<=targetKB){url=testUrl;quality=q}else break}}return url}
        let low=0.1,high=quality;for(let i=0;i<15;i++){const mid=(low+high)/2;const testUrl=canvas.toDataURL('image/jpeg',mid);if(testUrl.length/1024<=targetKB){low=mid;url=testUrl}else high=mid}return url}
}

// 事件绑定
uploadInput.onchange=e=>{if(e.target.files[0])loadImage(e.target.files[0])};
uploadPlaceholder.onclick=()=>uploadInput.click();
document.getElementById('imgContainer').ondragover=e=>e.preventDefault();
document.getElementById('imgContainer').ondrop=e=>{e.preventDefault();if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0])};
resetBtn.onclick=resetImage;reuploadBtn.onclick=()=>uploadInput.click();undoBtn.onclick=undo;fitViewBtn.onclick=fitImageToContainer;

rotateSlider.oninput=()=>{if(!currentImage||isProcessing)return;rotateAngle=+rotateSlider.value;rotateValueSpan.innerText=rotateAngle+'°';renderImage();updateViewportTransform();showCustomBox()};
ratioSelect.onchange=()=>{if(currentImage&&!isProcessing){saveHistory();renderImage();fitImageToContainer();updateCropBoxSize();showCustomBox()}};

customCropBox.addEventListener('mousedown',e=>{if(!customBoxActive||isProcessing)return;e.stopPropagation();
    if(e.target.classList.contains('resize-handle')){isResizingBox=true;dragStartMouse={x:e.clientX,y:e.clientY};dragStartRect={...customBoxRect};e.preventDefault()}
    else{isDraggingBox=true;dragStartMouse={x:e.clientX,y:e.clientY};dragStartRect={...customBoxRect};e.preventDefault()}});
window.addEventListener('mousemove',e=>{if(isDraggingBox){const dx=e.clientX-dragStartMouse.x,dy=e.clientY-dragStartMouse.y;
    customBoxRect.left=Math.max(0,Math.min(relativeContainer.getBoundingClientRect().width-customBoxRect.width,dragStartRect.left+dx));
    customBoxRect.top=Math.max(0,Math.min(relativeContainer.getBoundingClientRect().height-customBoxRect.height,dragStartRect.top+dy));updateCustomBoxUI()}
    else if(isResizingBox){const dx=e.clientX-dragStartMouse.x,dy=e.clientY-dragStartMouse.y;
    customBoxRect.width=Math.max(40,Math.min(relativeContainer.getBoundingClientRect().width,dragStartRect.width+dx));
    customBoxRect.height=Math.max(40,Math.min(relativeContainer.getBoundingClientRect().height,dragStartRect.height+dy));updateCustomBoxUI();
    customWidthInput.value=Math.round(customBoxRect.width);customHeightInput.value=Math.round(customBoxRect.height)}});
window.addEventListener('mouseup',()=>{isDraggingBox=false;isResizingBox=false});
customWidthInput.addEventListener('input',()=>{if(customBoxActive){customBoxRect.width=Math.min(parseInt(customWidthInput.value)||40,relativeContainer.getBoundingClientRect().width);updateCustomBoxUI()}});
customHeightInput.addEventListener('input',()=>{if(customBoxActive){customBoxRect.height=Math.min(parseInt(customHeightInput.value)||40,relativeContainer.getBoundingClientRect().height);updateCustomBoxUI()}});
// 更新裁剪框大小根据选择的证件照尺寸
function updateCropBoxSize(){
    const opt=ratioSelect.options[ratioSelect.selectedIndex];
    if(opt&&opt.dataset.w&&opt.dataset.h){
        const w=parseInt(opt.dataset.w),h=parseInt(opt.dataset.h);
        customWidthInput.value=w;customHeightInput.value=h;
        const containerRect=relativeContainer.getBoundingClientRect();
        customBoxRect.width=Math.min(w,containerRect.width-10);
        customBoxRect.height=Math.min(h,containerRect.height-10);
        customBoxRect.left=Math.max(0,(containerRect.width-customBoxRect.width)/2);
        customBoxRect.top=Math.max(0,(containerRect.height-customBoxRect.height)/2);
        updateCustomBoxUI();
    }
}
applyCustomCropBtn.onclick=applyCustomCrop;
// 圆角滑块
cornerRadiusSlider.addEventListener('input',()=>{
    cornerRadiusValue.textContent=cornerRadiusSlider.value;
    customCropBox.style.borderRadius=cornerRadiusSlider.value+'%';
});
// 下载裁剪后的图片
downloadCropBtn.onclick=()=>{
    if(!currentImage)return alert('请先上传图片');
    if(isProcessing)return;
    
    // 获取裁剪区域
    const cropArea=getCanvasCropAreaFromBox();
    if(!cropArea)return alert('裁剪区域无效');
    
    // 获取圆角值（0-45对应0%-100%的border-radius）
    const radius=parseInt(cornerRadiusSlider.value);
    
    // 创建输出canvas
    const outputCanvas=document.createElement('canvas');
    outputCanvas.width=cropArea.w;
    outputCanvas.height=cropArea.h;
    const outputCtx=outputCanvas.getContext('2d');
    
    // 如果有圆角，应用圆角裁剪
    if(radius>0){
        const r=Math.min(cropArea.w,cropArea.h)*(radius/100);
        outputCtx.beginPath();
        outputCtx.moveTo(r,0);
        outputCtx.lineTo(cropArea.w-r,0);
        outputCtx.quadraticCurveTo(cropArea.w,0,cropArea.w,r);
        outputCtx.lineTo(cropArea.w,cropArea.h-r);
        outputCtx.quadraticCurveTo(cropArea.w,cropArea.h,cropArea.w-r,cropArea.h);
        outputCtx.lineTo(r,cropArea.h);
        outputCtx.quadraticCurveTo(0,cropArea.h,0,cropArea.h-r);
        outputCtx.lineTo(0,r);
        outputCtx.quadraticCurveTo(0,0,r,0);
        outputCtx.closePath();
        outputCtx.clip();
    }
    
    // 绘制裁剪区域
    outputCtx.drawImage(canvas,cropArea.x,cropArea.y,cropArea.w,cropArea.h,0,0,cropArea.w,cropArea.h);
    
    // 获取下载格式
    const format=downloadFormat.value;
    let mimeType,extension;
    switch(format){
        case 'jpg':mimeType='image/jpeg';extension='jpg';break;
        case 'png':mimeType='image/png';extension='png';break;
        case 'webp':mimeType='image/webp';extension='webp';break;
        case 'bmp':mimeType='image/bmp';extension='bmp';break;
        case 'gif':mimeType='image/gif';extension='gif';break;
        default:mimeType='image/jpeg';extension='jpg';
    }
    
    // 如果是jpg格式且有圆角，需要添加白色背景（因为jpg不支持透明）
    if((format==='jpg'||format==='jpeg'||format==='bmp')&&radius>0){
        const tempCanvas=document.createElement('canvas');
        tempCanvas.width=cropArea.w;
        tempCanvas.height=cropArea.h;
        const tempCtx=tempCanvas.getContext('2d');
        tempCtx.fillStyle='#ffffff';
        tempCtx.fillRect(0,0,cropArea.w,cropArea.h);
        tempCtx.drawImage(outputCanvas,0,0);
        const quality=(format==='jpg'||format==='webp')?0.92:undefined;
        const dataURL=tempCanvas.toDataURL(mimeType,quality);
        const a=document.createElement('a');
        a.download='证件照_'+Date.now()+'.'+extension;
        a.href=dataURL;
        a.click();
    }else{
        const quality=(format==='jpg'||format==='webp')?0.92:undefined;
        const dataURL=outputCanvas.toDataURL(mimeType,quality);
        const a=document.createElement('a');
        a.download='证件照_'+Date.now()+'.'+extension;
        a.href=dataURL;
        a.click();
    }
};
// AI抠图开关
enableMatteCheckbox.addEventListener('change',()=>{
    if(enableMatteCheckbox.checked){
        if(originalFile)doMatte(originalFile);
    }else{
        mattedImage=null;
        renderImage();
    }
});

document.querySelector('.canvas-wrapper').addEventListener('wheel',e=>{if(!currentImage||isProcessing)return;e.preventDefault();
    let delta=e.deltaY>0?-0.05:0.05;zoomScale=Math.max(0.05,Math.min(3.0,zoomScale+delta));updateViewportTransform();updateZoomSlider();
    if(customBoxActive)updateCustomBoxUI()},{passive:false});

zoomSlider.addEventListener('input',()=>{if(!currentImage)return;zoomScale=Math.max(0.05,Math.min(3.0,parseFloat(zoomSlider.value)/100));updateViewportTransform();updateZoomSlider();if(customBoxActive)updateCustomBoxUI()});
qualitySlider.addEventListener('input',()=>{qualityValue.innerText=qualitySlider.value+'%'});

let isDraggingImage=false,imgDragStart={x:0,y:0},startOffset={x:0,y:0};
imageViewport.addEventListener('mousedown',e=>{if(isDraggingBox||isResizingBox||isProcessing)return;
    isDraggingImage=true;imgDragStart={x:e.clientX,y:e.clientY};startOffset={...viewportOffset};imageViewport.style.cursor='grabbing';e.preventDefault()});
window.addEventListener('mousemove',e=>{if(isDraggingImage){viewportOffset.x=startOffset.x+(e.clientX-imgDragStart.x)/zoomScale;viewportOffset.y=startOffset.y+(e.clientY-imgDragStart.y)/zoomScale;updateViewportTransform()}});
window.addEventListener('mouseup',()=>{if(isDraggingImage){isDraggingImage=false;imageViewport.style.cursor='grab'}});

})();
</script>
</body>
</html>
