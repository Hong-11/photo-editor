<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background-image: url('bg/bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: #fff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 400px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        .link {
            display: block;
            margin-top: 15px;
            padding: 18px 25px;
            background: rgba(0, 170, 255, 0.25);
            border: 2px solid rgba(0, 170, 255, 0.6);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .link:hover {
            background: rgba(0, 170, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 170, 255, 0.5);
            transform: scale(1.03);
        }
        .link-photo {
            background: rgba(255, 170, 0, 0.25);
            border-color: rgba(255, 170, 0, 0.6);
        }
        .link-photo:hover {
            background: rgba(255, 170, 0, 0.4);
            box-shadow: 0 0 25px rgba(255, 170, 0, 0.5);
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 应用中心</h1>
        <a class="link" href="formal/Photo.html" target="_blank">
            📷 证件照编辑器
        </a>
        <a class="link link-photo" href="game/Game.html" target="_blank">
            ✈️ 飞机大战
        </a>
        <div class="footer">纯本地运行 · 无需联网</div>
    </div>
</body>
</html>
